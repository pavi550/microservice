name: Destroy microservice-eks project

on: workflow_dispatch
env :
  EKS_DIR: terraform/eks
  MONITORING_DIR: terraform/monitoring
  TF_VERSION: 1.14.9

jobs:
  microservice:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.2
    - name: configure AWS cli
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Delete EKS cluster
      run: echo "Deleting EKS cluster..."
    - name: Delete microservice from EKS cluster
      run: echo "Deleting microservice from EKS cluster..."
    - name: Connect to EKS cluster
      run: |
        echo "Connecting to EKS cluster..."
        aws eks update-kubeconfig --name your-cluster-name --region us-east-1
        kubectl get nodes
        kubectl get pods -n your-namespace
        kubectl get services -n your-namespace
        echo "Connected to EKS cluster and verified microservice deployment."
    - name: Delete Example Microservice
      run: kubectl delete -f https://github.com/pavi550/microservices-demo/blob/main/release/kubernetes-manifests.yaml

    - name: Check Deployment status
      run: kubectl get all -o wide -A
      
    terraform_monitoring :
    needs : microservice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.2
      - name: configure AWS cli
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name : Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
          trivy version
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: ${{ env.MONITORING_DIR }}
        run: terraform init
      - name: Terraform Plan
        working-directory: ${{ env.MONITORING_DIR }}  
        run: terraform plan -out=tfplan -input=false
      - name: Terraform destroy
        working-directory: ${{ env.MONITORING_DIR }}
        run: terraform destroy -auto-approve

    terraform_destroy_microservice:
     needs : microservice
     runs-on: ubuntu-latest
     steps:
     - name: Checkout code
       uses: actions/checkout@v2
     - name: configure AWS cli
       uses: aws-actions/configure-aws-credentials@v6.1.0
       with:
         aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
         aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
         aws-region: us-east-1
     - name: Setup Terraform
       uses: hashicorp/setup-terraform@v3
       with:
         terraform_version: ${{ env.TF_VERSION }}
     - name: Terraform Init
       working-directory: ${{ env.EKS_DIR }}
       run: terraform init
     - name: Terraform destroy
       working-directory: ${{ env.EKS_DIR }}
       run: terraform destroy -auto-approve
      - name: configure AWS cli
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: ${{ env.MONITORING_DIR }}
        run: terraform init
    - name: Terraform destroy
      working-directory: ${{ env.MONITORING_DIR }}
      run: terraform destroy -auto-approve
