name: microservice-eks project

on:
  workflow_dispatch:
    inputs:
      apply_or_destroy:
        description: 'Choose whether to apply or destroy the infrastructure'
        required: true
        default: 'apply'
        type: choice
        options:
        - apply
        - destroy
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: configure AWS cli
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: 1.14.9
    - name: Terraform Init
      working-directory: terraform
      run: terraform init -backend-config=version.tf
    - name: Terraform Plan
      working-directory: terraform
      run: terraform plan -out=tfplan -input=false
    - name: Terraform Apply
      working-directory: terraform
      if: github.event.inputs.apply_or_destroy == 'apply'
      run: terraform apply -input=false tfplan
    - name: Terraform Destroy
      working-directory: terraform
      if: github.event.inputs.apply_or_destroy == 'destroy'
      run: terraform destroy -input=false -auto-approve
