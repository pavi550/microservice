name: Deploy microservice-eks project

on: workflow_dispatch
env :
  EKS_DIR: terraform/eks
  MONITORING_DIR: terraform/monitoring
  CLUSTER_NAME: my-eks-cluster-v2
  MICROSERVICE_MANIFEST_URL: https://raw.githubusercontent.com/pavi550/microservices-demo/main/release/kubernetes-manifests.yaml
  METRICS_SERVER_MANIFEST_URL: https://github.com/kubernetes-sigs/metrics-server/releases/latest/download/components.yaml
  HPA_NAMESPACE: default
  HPA_MIN_REPLICAS: 2
  HPA_MAX_REPLICAS: 6
  HPA_CPU_PERCENT: 70
  TF_VERSION: 1.14.9
jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v2
    - name: configure AWS cli
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}
    - name: Terraform Init
      working-directory: ${{ env.EKS_DIR }}
      run: terraform init
    - name: Import existing EKS add-ons into Terraform state
      working-directory: ${{ env.EKS_DIR }}
      run: |
        set -euo pipefail

        for addon in vpc-cni kube-proxy coredns; do
          state_addr="module.eks.aws_eks_addon.this[\"${addon}\"]"

          if terraform state list | grep -qF "$state_addr"; then
            echo "${addon} already in Terraform state."
            continue
          fi

          if aws eks describe-addon --cluster-name "${{ env.CLUSTER_NAME }}" --addon-name "$addon" --region us-east-1 >/dev/null 2>&1; then
            echo "Importing existing addon: $addon"
            terraform import "$state_addr" "${{ env.CLUSTER_NAME }}:${addon}"
          else
            echo "Addon $addon does not exist yet. Terraform will create it."
          fi
        done
    - name: Terraform Plan
      working-directory: ${{ env.EKS_DIR }}
      run: terraform plan -out=tfplan -input=false
    - name: Terraform Apply
      working-directory: ${{ env.EKS_DIR }}
      run: terraform apply -input=false tfplan

  terraform_deploy_microservice:
    runs-on: ubuntu-latest
    needs: terraform
    steps:
    - name: Checkout code
      uses: actions/checkout@v4.1.2
    - name: configure AWS cli
      uses: aws-actions/configure-aws-credentials@v6.1.0
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Configure kubectl for EKS
      run: |
        aws eks update-kubeconfig --name ${{ env.CLUSTER_NAME }} --region us-east-1
        kubectl get nodes
        kubectl get namespaces
    - name: Deploy example microservice manifests
      run: kubectl apply -f ${{ env.MICROSERVICE_MANIFEST_URL }}

    - name: Install metrics server
      run: |
        kubectl apply -f ${{ env.METRICS_SERVER_MANIFEST_URL }}
        kubectl rollout status deployment/metrics-server -n kube-system --timeout=180s

    - name: Create autoscaling policies for deployments
      run: |
        deployments=$(kubectl get deploy -n ${{ env.HPA_NAMESPACE }} -o jsonpath='{.items[*].metadata.name}')
        if [ -z "$deployments" ]; then
          echo "No deployments found in namespace ${{ env.HPA_NAMESPACE }}."
          exit 0
        fi

        for d in $deployments; do
          kubectl autoscale deployment "$d" \
            -n ${{ env.HPA_NAMESPACE }} \
            --cpu-percent=${{ env.HPA_CPU_PERCENT }} \
            --min=${{ env.HPA_MIN_REPLICAS }} \
            --max=${{ env.HPA_MAX_REPLICAS }} \
            --dry-run=client -o yaml | kubectl apply -f - || true
        done

        kubectl get hpa -n ${{ env.HPA_NAMESPACE }}

    - name: Check deployment status
      run: |
        sleep 40 #wait
        kubectl get all -o wide -A

  terraform_monitoring:
    needs: terraform_deploy_microservice
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4.1.2
      - name: configure AWS cli
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      
      - name : Install Trivy
        run: |
          sudo apt-get update && sudo apt-get install -y wget apt-transport-https gnupg lsb-release
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
          trivy version
      
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        working-directory: ${{ env.MONITORING_DIR }}
        run: terraform init
      - name: Terraform Plan
        working-directory: ${{ env.MONITORING_DIR }}  
        run: terraform plan -out=tfplan -input=false
      - name: Terraform Apply
        working-directory: ${{ env.MONITORING_DIR }}
        run: terraform apply -input=false tfplan

      - name: Check vulnerabilities in monitoring deployment
        run: |
          echo "Checking for vulnerabilities in monitoring deployment..."
          trivy k8s --namespace monitoring --severity HIGH,CRITICAL
          
